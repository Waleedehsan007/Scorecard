<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Weekly Performance Scorecard — Apta Investment Group</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,300..600;1,6..72,300..600&family=Geist:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --paper:   #F4EFE6;
    --paper-2: #EDE6D9;
    --paper-3: #E3DAC9;
    --ink:     #1C1916;
    --ink-2:   #2E2A24;
    --ink-3:   #4A4439;
    --mute:    #7A7163;
    --hair:    #C8BFAD;
    --hair-soft: #D9D0BD;
    --accent:    #A8763B;
    --accent-2:  #C99258;
    --accent-soft: #E7D9BF;

    /* Status — tuned to the warm palette */
    --g-bg:   #E2E7CC;
    --g-text: #4B5E26;
    --g-dot:  #6F8C2F;
    --y-bg:   #F1E3B8;
    --y-text: #7A5C12;
    --y-dot:  #C9A040;
    --r-bg:   #EFD2C9;
    --r-text: #8B3A24;
    --r-dot:  #B65538;
    --n-bg:   #E3DAC9;
    --n-text: #7A7163;

    /* Pod accents — derived from the brand */
    --mc-bg:  #E0DCEC;  --mc-text: #4A3D7A;
    --dir-bg: #DCE6E4;  --dir-text: #2D5A4E;
    --ie-bg:  #E2DDC9;  --ie-text: #5C5023;
    --imm-bg: #EAD5C2;  --imm-text: #8A4E1F;

    --focus-ring: rgba(168, 118, 59, 0.30);
  }

  html, body { margin: 0; padding: 0; }
  body {
    font-family: "Geist", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    background: var(--paper);
    color: var(--ink);
    font-size: 13.5px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    padding: 0;
  }
  ::selection { background: var(--accent); color: var(--paper); }

  /* ─────────── THEMES ─────────── */
  body[data-theme="ink"] {
    --paper:   #15130F;
    --paper-2: #1C1916;
    --paper-3: #252119;
    --ink:     #F2EADB;
    --ink-2:   #E6DCC8;
    --ink-3:   #BCB19A;
    --mute:    #8A8170;
    --hair:    #3B3629;
    --hair-soft: #2A2620;
    --accent:    #D2A45F;
    --accent-2:  #E7B974;
    --accent-soft: #3A2E1C;

    --g-bg: #2F3A1E; --g-text: #B7C97A; --g-dot: #B7C97A;
    --y-bg: #3D331A; --y-text: #E6C168; --y-dot: #E6C168;
    --r-bg: #3D241E; --r-text: #E89A7C; --r-dot: #E89A7C;
    --n-bg: #25211B; --n-text: #8A8170;

    --mc-bg:  #2A2538; --mc-text: #B7AEDB;
    --dir-bg: #1F2E2A; --dir-text: #9BC7B8;
    --ie-bg:  #2D2A1C; --ie-text: #D9CE92;
    --imm-bg: #3A2A1A; --imm-text: #E6B58A;

    --focus-ring: rgba(210, 164, 95, 0.30);
  }

  body[data-theme="sepia"] {
    --paper:   #EADBC0;
    --paper-2: #E1CFB0;
    --paper-3: #D5BF98;
    --ink:     #2A1F12;
    --ink-2:   #3A2C1B;
    --ink-3:   #5A4A35;
    --mute:    #7E6A50;
    --hair:    #B9A684;
    --hair-soft: #C9B896;
    --accent:    #894F1D;
    --accent-2:  #B36E2E;
    --accent-soft: #D8C39F;

    --focus-ring: rgba(137, 79, 29, 0.30);
  }

  /* ─────────── DENSITY ─────────── */
  body[data-density="boardroom"] { font-size: 15px; }
  body[data-density="boardroom"] .pod-title { font-size: 26px; }
  body[data-density="boardroom"] .metric-name { font-size: 17px; }
  body[data-density="boardroom"] .pod-header { padding: 24px 28px; }
  body[data-density="boardroom"] tbody td,
  body[data-density="boardroom"] thead th { padding: 18px 28px; }
  body[data-density="boardroom"] .sub-row td { padding: 18px 28px 10px !important; }
  body[data-density="boardroom"] textarea.notes-input { min-height: 48px; }
  body[data-density="boardroom"] input.actual-input { padding: 11px 12px; font-size: 14px; }
  body[data-density="boardroom"] .mh-left h1 { font-size: 46px; }
  body[data-density="boardroom"] .progress-card .big { font-size: 68px; }
  body[data-density="boardroom"] .stile .num { font-size: 36px; }
  body[data-density="boardroom"] .pod { margin-bottom: 28px; }

  body[data-density="compact"] { font-size: 12.5px; }
  body[data-density="compact"] .pod-title { font-size: 17px; }
  body[data-density="compact"] .metric-name { font-size: 13.5px; margin-bottom: 2px; }
  body[data-density="compact"] .metric-source { font-size: 9.5px; }
  body[data-density="compact"] .pod-header { padding: 12px 18px; }
  body[data-density="compact"] tbody td,
  body[data-density="compact"] thead th { padding: 7px 18px; }
  body[data-density="compact"] thead th { font-size: 9px; }
  body[data-density="compact"] .sub-row td { padding: 10px 18px 5px !important; }
  body[data-density="compact"] .sub-row td .lbl { font-size: 12px; }
  body[data-density="compact"] textarea.notes-input { min-height: 30px; padding: 5px 8px; font-size: 12px; }
  body[data-density="compact"] input.actual-input { padding: 5px 8px; font-size: 11.5px; }
  body[data-density="compact"] .status-seg button { padding: 5px 0; }
  body[data-density="compact"] .mh-left h1 { font-size: 30px; }
  body[data-density="compact"] .progress-card .big { font-size: 44px; }
  body[data-density="compact"] .stile .num { font-size: 22px; }
  body[data-density="compact"] .pod { margin-bottom: 14px; }
  body[data-density="compact"] .progress-card { min-height: 110px; padding: 16px 18px; }
  body[data-density="compact"] .stile { min-height: 56px; padding: 8px 10px; }

  /* ─────────── STATUS STYLE ─────────── */
  /* "bar" (default) — handled by base CSS above */

  body[data-status-style="filled"] tbody tr.row-g { background: color-mix(in srgb, var(--g-dot) 8%, transparent); }
  body[data-status-style="filled"] tbody tr.row-y { background: color-mix(in srgb, var(--y-dot) 9%, transparent); }
  body[data-status-style="filled"] tbody tr.row-r { background: color-mix(in srgb, var(--r-dot) 9%, transparent); }
  body[data-status-style="filled"] tbody tr.row-g td:first-child,
  body[data-status-style="filled"] tbody tr.row-y td:first-child,
  body[data-status-style="filled"] tbody tr.row-r td:first-child { box-shadow: inset 3px 0 0 currentColor; }
  body[data-status-style="filled"] tbody tr.row-g td:first-child { color: var(--g-dot); }
  body[data-status-style="filled"] tbody tr.row-y td:first-child { color: var(--y-dot); }
  body[data-status-style="filled"] tbody tr.row-r td:first-child { color: var(--r-dot); }
  body[data-status-style="filled"] tbody tr.row-g td:first-child .metric-name,
  body[data-status-style="filled"] tbody tr.row-y td:first-child .metric-name,
  body[data-status-style="filled"] tbody tr.row-r td:first-child .metric-name { color: var(--ink); }

  body[data-status-style="minimal"] tbody tr.row-g td:first-child,
  body[data-status-style="minimal"] tbody tr.row-y td:first-child,
  body[data-status-style="minimal"] tbody tr.row-r td:first-child { box-shadow: none; }
  body[data-status-style="minimal"] .status-seg { border-color: var(--hair-soft); }
  body[data-status-style="minimal"] .status-seg button { background: transparent; }
  body[data-status-style="minimal"] .status-seg button.is-active { background: transparent; color: var(--ink); }
  body[data-status-style="minimal"] .status-seg button[data-val="g"].is-active { color: var(--g-dot); background: var(--paper-2); }
  body[data-status-style="minimal"] .status-seg button[data-val="y"].is-active { color: var(--y-dot); background: var(--paper-2); }
  body[data-status-style="minimal"] .status-seg button[data-val="r"].is-active { color: var(--r-dot); background: var(--paper-2); }
  body[data-status-style="minimal"] .status-seg button[data-val="n"].is-active { color: var(--ink); background: var(--paper-2); }
  body[data-status-style="minimal"] .status-seg button.is-active .sd { box-shadow: none; }

  /* ─────────── TWEAKS PANEL ─────────── */
  .tweaks-panel {
    position: fixed;
    bottom: 24px;
    right: 24px;
    width: 296px;
    background: var(--paper);
    color: var(--ink);
    border: 1px solid var(--hair);
    border-radius: 4px;
    box-shadow: 0 24px 56px -24px rgba(28,25,22,0.45);
    z-index: 200;
    opacity: 0;
    transform: translateY(12px);
    pointer-events: none;
    transition: opacity .25s ease, transform .25s ease;
    font-family: "Geist", sans-serif;
  }
  .tweaks-panel.is-open {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .tweaks-panel::before {
    content: "";
    position: absolute;
    top: -1px; left: -1px; right: -1px;
    height: 2px;
    background: var(--accent);
  }
  .tweaks-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 16px 18px 12px;
    border-bottom: 1px solid var(--hair-soft);
  }
  .tweaks-header .title {
    font-family: "Newsreader", Georgia, serif;
    font-variation-settings: "opsz" 20;
    font-size: 18px;
    color: var(--ink);
    letter-spacing: -0.01em;
  }
  .tweaks-header .title em { font-style: italic; color: var(--accent); }
  .tweaks-header .close {
    appearance: none;
    border: 0;
    background: transparent;
    font-family: "JetBrains Mono", monospace;
    font-size: 14px;
    color: var(--mute);
    cursor: default;
    padding: 4px 6px;
    transition: color .15s ease;
  }
  .tweaks-header .close:hover { color: var(--ink); }

  .tweaks-body { padding: 16px 18px 18px; display: grid; gap: 18px; }

  .tweak-group .group-label {
    font-family: "JetBrains Mono", monospace;
    font-size: 9.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mute);
    margin-bottom: 8px;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .tweak-group .group-label .v {
    font-size: 10px;
    color: var(--ink-3);
    letter-spacing: 0.04em;
    text-transform: none;
  }
  .seg {
    display: grid;
    grid-auto-flow: column;
    grid-auto-columns: 1fr;
    border: 1px solid var(--hair);
    border-radius: 3px;
    overflow: hidden;
    background: var(--paper);
  }
  .seg button {
    appearance: none;
    border: 0;
    background: transparent;
    padding: 8px 4px;
    font: inherit;
    font-family: "Geist", sans-serif;
    font-size: 11.5px;
    color: var(--ink-3);
    cursor: default;
    border-right: 1px solid var(--hair-soft);
    transition: background .15s ease, color .15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
  .seg button:last-child { border-right: 0; }
  .seg button:hover { background: var(--paper-2); color: var(--ink); }
  .seg button.is-active { background: var(--ink); color: var(--paper); }
  .seg .sw {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }
  .seg button[data-val="ivory"] .sw { background: #F4EFE6; box-shadow: inset 0 0 0 1px var(--hair); }
  .seg button[data-val="ink"]   .sw { background: #15130F; box-shadow: inset 0 0 0 1px var(--ink-3); }
  .seg button[data-val="sepia"] .sw { background: #C9A878; box-shadow: inset 0 0 0 1px #8A6A40; }

  .seg.density button[data-val="boardroom"] .sw { width: 14px; height: 14px; }
  .seg.density button[data-val="ledger"] .sw { width: 10px; height: 10px; }
  .seg.density button[data-val="compact"] .sw { width: 6px; height: 6px; }

  .seg.status-style button[data-val="bar"] .sw { width: 3px; height: 12px; border-radius: 1px; background: var(--accent); }
  .seg.status-style button[data-val="filled"] .sw { width: 14px; height: 10px; border-radius: 2px; background: var(--accent); opacity: 0.4; }
  .seg.status-style button[data-val="minimal"] .sw { width: 8px; height: 8px; background: transparent; box-shadow: inset 0 0 0 1.5px var(--accent); }

  .tweaks-foot {
    padding: 10px 18px 14px;
    border-top: 1px solid var(--hair-soft);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--mute);
  }
  .tweaks-foot button {
    appearance: none;
    border: 0;
    background: transparent;
    font: inherit;
    color: var(--ink-3);
    cursor: default;
    border-bottom: 1px solid transparent;
    padding-bottom: 1px;
    transition: color .15s ease, border-color .15s ease;
  }
  .tweaks-foot button:hover { color: var(--accent); border-color: var(--accent); }

  .serif { font-family: "Newsreader", Georgia, serif; font-variation-settings: "opsz" 32; }
  .mono  { font-family: "JetBrains Mono", ui-monospace, monospace; font-feature-settings: "tnum"; }

  .page {
    max-width: 1440px;
    margin: 0 auto;
    padding: 40px 48px 56px;
  }

  /* ─────────── MASTHEAD ─────────── */
  .masthead {
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 28px;
    align-items: flex-start;
    padding-bottom: 22px;
    border-bottom: 1px solid var(--hair);
    margin-bottom: 28px;
    position: relative;
  }
  .masthead::after {
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: -3px;
    height: 1px;
    background: var(--hair-soft);
  }

  .mh-left .eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 14px;
  }
  .mh-left .eyebrow::before {
    content: "";
    width: 22px; height: 1px;
    background: var(--accent);
  }
  .mh-left h1 {
    font-family: "Newsreader", Georgia, serif;
    font-variation-settings: "opsz" 36;
    font-weight: 400;
    font-size: 38px;
    line-height: 1.05;
    letter-spacing: -0.022em;
    color: var(--ink);
  }
  .mh-left h1 em {
    font-style: italic;
    color: var(--accent);
    font-variation-settings: "opsz" 36;
  }
  .mh-left .ledger {
    margin-top: 16px;
    display: flex;
    flex-wrap: wrap;
    gap: 0;
    border-top: 1px dashed var(--hair);
    padding-top: 14px;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--mute);
  }
  .mh-left .ledger .cell {
    display: inline-flex;
    align-items: baseline;
    gap: 8px;
    padding-right: 24px;
    margin-right: 24px;
    border-right: 1px solid var(--hair-soft);
  }
  .mh-left .ledger .cell:last-child { border-right: 0; margin-right: 0; padding-right: 0; }
  .mh-left .ledger .k {
    font-size: 9.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mute);
  }
  .mh-left .ledger .v {
    color: var(--ink);
    font-feature-settings: "tnum";
  }

  /* Week selectors */
  .mh-right {
    display: flex;
    gap: 10px;
    align-items: flex-start;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .week-card {
    background: var(--paper-2);
    border: 1px solid var(--hair);
    padding: 14px 16px 12px;
    min-width: 140px;
    position: relative;
  }
  .week-card::before {
    content: "";
    position: absolute;
    top: -1px; left: -1px; right: -1px;
    height: 2px;
    background: var(--accent);
  }
  .week-card .lbl {
    display: block;
    font-family: "JetBrains Mono", monospace;
    font-size: 9.5px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mute);
    margin-bottom: 6px;
  }
  .week-card input {
    appearance: none;
    border: 0;
    background: transparent;
    font-family: "JetBrains Mono", monospace;
    font-size: 14px;
    color: var(--ink);
    outline: none;
    padding: 0;
    width: 100%;
    cursor: text;
  }
  .week-card input[type="number"] { width: 60px; font-size: 18px; font-weight: 500; }
  .week-card input:focus {
    outline: none;
    color: var(--accent);
  }
  .week-card .of { font-family: "JetBrains Mono", monospace; font-size: 12px; color: var(--mute); }

  /* ─────────── SUMMARY RAIL ─────────── */
  .summary-rail {
    display: block;
    margin-bottom: 28px;
  }

  .progress-card {
    background: var(--paper-2);
    border: 1px solid var(--hair);
    padding: 22px 24px;
    position: relative;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    min-height: 142px;
  }
  .progress-card::before {
    content: "";
    position: absolute;
    top: -1px; left: -1px; right: -1px;
    height: 2px;
    background: var(--accent);
  }
  .progress-card .label {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--mute);
    display: flex;
    justify-content: space-between;
    align-items: baseline;
  }
  .progress-card .label .week {
    color: var(--accent);
  }
  .progress-card .big {
    font-family: "Newsreader", Georgia, serif;
    font-variation-settings: "opsz" 60;
    font-size: 56px;
    line-height: 0.92;
    letter-spacing: -0.035em;
    color: var(--ink);
    margin: 8px 0 0;
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
  .progress-card .big .pct { color: var(--ink); }
  .progress-card .big .sym { color: var(--accent); font-style: italic; }
  .progress-card .bar {
    margin-top: 14px;
    position: relative;
    height: 6px;
    background: var(--paper-3);
  }
  .progress-card .bar .fill {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    background: var(--accent);
    transition: width .4s ease;
  }
  .progress-card .bar .target-mark {
    position: absolute;
    top: -3px; bottom: -3px;
    width: 1.5px;
    background: var(--ink);
  }
  .progress-card .foot-meta {
    font-family: "JetBrains Mono", monospace;
    font-size: 10.5px;
    letter-spacing: 0.04em;
    color: var(--mute);
    margin-top: 6px;
    display: flex;
    justify-content: space-between;
  }
  .progress-card .foot-meta .v { color: var(--ink-3); }

  .status-tiles {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .stile {
    background: var(--paper-2);
    border: 1px solid var(--hair);
    padding: 10px 14px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    position: relative;
    cursor: default;
    transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
    min-height: 70px;
  }
  .stile:hover { transform: translateY(-2px); box-shadow: 0 10px 24px -18px rgba(28,25,22,0.4); }
  .stile.active {
    background: var(--paper);
    box-shadow: 0 0 0 1.5px var(--ink) inset;
  }
  .stile .row1 {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .stile .row1 .dot {
    width: 10px; height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
    margin-top: 4px;
  }
  .stile .row1 .pct {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 0.04em;
    color: var(--mute);
    font-feature-settings: "tnum";
  }
  .stile .num {
    font-family: "Newsreader", Georgia, serif;
    font-variation-settings: "opsz" 48;
    font-size: 28px;
    line-height: 0.95;
    letter-spacing: -0.03em;
    color: var(--ink);
    margin: 2px 0 2px;
    font-feature-settings: "tnum";
  }
  .stile .lbl {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--mute);
  }
  .stile.s-g .num { color: var(--g-dot); }
  .stile.s-g .dot { background: var(--g-dot); }
  .stile.s-y .num { color: var(--y-dot); }
  .stile.s-y .dot { background: var(--y-dot); }
  .stile.s-r .num { color: var(--r-dot); }
  .stile.s-r .dot { background: var(--r-dot); }
  .stile.s-n .dot { background: var(--hair); }

  /* ─────────── SECTION (POD) ─────────── */
  .pod {
    background: var(--paper);
    border: 1px solid var(--hair);
    margin-bottom: 22px;
    position: relative;
  }
  .pod::before {
    content: "";
    position: absolute;
    top: -1px; left: -1px; right: -1px;
    height: 2px;
    background: var(--accent);
  }

  .pod-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    border-bottom: 1px solid var(--hair-soft);
    background: var(--paper-2);
    gap: 24px;
    flex-wrap: wrap;
  }
  .pod-id {
    display: flex;
    align-items: center;
    gap: 14px;
    flex: 1;
    min-width: 260px;
  }
  .pod-badge {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.16em;
    padding: 5px 10px;
    border: 1px solid currentColor;
    border-radius: 2px;
    text-transform: uppercase;
  }
  .pod-badge.b-mc  { color: var(--mc-text);  background: var(--mc-bg);  border-color: transparent; }
  .pod-badge.b-dir { color: var(--dir-text); background: var(--dir-bg); border-color: transparent; }
  .pod-badge.b-ie  { color: var(--ie-text);  background: var(--ie-bg);  border-color: transparent; }
  .pod-badge.b-imm { color: var(--imm-text); background: var(--imm-bg); border-color: transparent; }

  .pod-title {
    font-family: "Newsreader", Georgia, serif;
    font-variation-settings: "opsz" 22;
    font-size: 21px;
    font-weight: 400;
    letter-spacing: -0.012em;
    color: var(--ink);
    line-height: 1.15;
  }
  .pod-title em { font-style: italic; color: var(--accent); }

  .pod-meta {
    display: inline-flex;
    align-items: center;
    gap: 16px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10.5px;
    letter-spacing: 0.06em;
    color: var(--mute);
  }
  .pod-meta .k { letter-spacing: 0.16em; text-transform: uppercase; }
  .pod-meta .v { color: var(--ink-3); padding-left: 6px; border-left: 1px solid var(--hair); margin-left: 4px; }

  .pod-pill-row {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 6px;
    background: var(--paper);
    border: 1px solid var(--hair);
    border-radius: 12px;
  }
  .pod-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 8px;
    font-family: "JetBrains Mono", monospace;
    font-size: 10.5px;
    color: var(--ink-3);
    font-feature-settings: "tnum";
    letter-spacing: 0.02em;
  }
  .pod-pill .pd { width: 7px; height: 7px; border-radius: 50%; }
  .pod-pill .pd.g { background: var(--g-dot); }
  .pod-pill .pd.y { background: var(--y-dot); }
  .pod-pill .pd.r { background: var(--r-dot); }
  .pod-pill .pd.n { background: var(--hair); }

  /* Subsection labels (inside table) */
  .sub-row {
    background: var(--paper-2);
  }
  .sub-row td {
    padding: 14px 24px 8px !important;
    border-bottom: 1px solid var(--hair-soft) !important;
    border-top: 1px dashed var(--hair-soft) !important;
  }
  .sub-row td .lbl {
    font-family: "Newsreader", Georgia, serif;
    font-variation-settings: "opsz" 14;
    font-style: italic;
    font-size: 14px;
    color: var(--ink-2);
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }
  .sub-row td .lbl::before {
    content: "";
    width: 14px; height: 1px;
    background: var(--accent);
  }
  .sub-row.first td { border-top: 0 !important; }

  /* ─────────── TABLE ─────────── */
  table {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  thead th {
    padding: 12px 24px;
    text-align: left;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    font-weight: 500;
    color: var(--mute);
    background: var(--paper);
    border-bottom: 1px solid var(--hair);
    position: sticky;
    top: 0;
    z-index: 2;
  }
  thead th .num-mark {
    display: inline-block;
    margin-right: 8px;
    color: var(--accent);
    font-size: 9px;
    letter-spacing: 0.1em;
  }

  th.col-metric { width: 39%; }
  th.col-target { width: 9%; }
  th.col-actual { width: 11%; }
  th.col-status { width: 12%; }
  th.col-notes  { width: 29%; }

  tbody tr {
    border-bottom: 1px solid var(--hair-soft);
    transition: background .12s ease;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:not(.sub-row):hover { background: var(--paper-2); }

  tbody td {
    padding: 12px 24px;
    vertical-align: middle;
  }

  .metric-name {
    font-family: "Newsreader", Georgia, serif;
    font-variation-settings: "opsz" 17;
    font-size: 15.5px;
    font-weight: 400;
    color: var(--ink);
    letter-spacing: -0.005em;
    line-height: 1.25;
    margin-bottom: 4px;
  }
  .metric-source {
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    color: var(--mute);
    letter-spacing: 0.02em;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .dir-arrow {
    text-align: center;
    font-family: "JetBrains Mono", monospace;
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
  }

  .target-val {
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    color: var(--ink-3);
    font-feature-settings: "tnum";
  }

  /* Inputs */
  input.actual-input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--hair);
    background: var(--paper);
    color: var(--ink);
    font-family: "JetBrains Mono", monospace;
    font-size: 13px;
    font-feature-settings: "tnum";
    outline: none;
    border-radius: 2px;
    transition: border-color .15s ease, box-shadow .15s ease, background .15s ease;
  }
  input.actual-input::placeholder { color: var(--hair); }
  input.actual-input:hover { border-color: var(--ink-3); }
  input.actual-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--focus-ring);
    background: var(--paper);
  }

  /* Status segmented control */
  .status-seg {
    display: inline-grid;
    grid-template-columns: repeat(4, 1fr);
    border: 1px solid var(--hair);
    border-radius: 2px;
    background: var(--paper);
    overflow: hidden;
    width: 100%;
    min-width: 100px;
  }
  .status-seg button {
    appearance: none;
    border: 0;
    background: transparent;
    padding: 7px 0;
    font: inherit;
    font-family: "JetBrains Mono", monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--mute);
    cursor: default;
    transition: background .15s ease, color .15s ease;
    border-right: 1px solid var(--hair-soft);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 5px;
  }
  .status-seg button:last-child { border-right: 0; }
  .status-seg button:hover { background: var(--paper-2); color: var(--ink-2); }
  .status-seg button .sd {
    width: 7px; height: 7px; border-radius: 50%; background: var(--hair);
  }
  .status-seg button[data-val="g"] .sd { background: var(--g-dot); }
  .status-seg button[data-val="y"] .sd { background: var(--y-dot); }
  .status-seg button[data-val="r"] .sd { background: var(--r-dot); }

  .status-seg button.is-active {
    color: var(--paper);
    background: var(--ink);
  }
  .status-seg button.is-active .sd { box-shadow: 0 0 0 1.5px var(--paper); }
  .status-seg button[data-val="g"].is-active { background: var(--g-dot); }
  .status-seg button[data-val="y"].is-active { background: var(--y-dot); color: #2E2A24; }
  .status-seg button[data-val="r"].is-active { background: var(--r-dot); }
  .status-seg button[data-val="n"].is-active { background: var(--ink-3); }

  /* Status outline on row when set */
  tbody tr.row-g td:first-child { box-shadow: inset 3px 0 0 var(--g-dot); }
  tbody tr.row-y td:first-child { box-shadow: inset 3px 0 0 var(--y-dot); }
  tbody tr.row-r td:first-child { box-shadow: inset 3px 0 0 var(--r-dot); }

  /* Notes */
  textarea.notes-input {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--hair);
    background: var(--paper);
    color: var(--ink);
    font-family: "Geist", sans-serif;
    font-size: 13px;
    outline: none;
    resize: vertical;
    min-height: 38px;
    line-height: 1.45;
    border-radius: 2px;
    transition: border-color .15s ease, box-shadow .15s ease;
  }
  textarea.notes-input::placeholder { color: var(--hair); font-style: italic; }
  textarea.notes-input:hover { border-color: var(--ink-3); }
  textarea.notes-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--focus-ring);
  }

  /* ─────────── FOOTER ─────────── */
  .foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 36px;
    padding-top: 22px;
    border-top: 1px solid var(--hair);
    gap: 16px;
    flex-wrap: wrap;
  }
  .foot-note {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    color: var(--mute);
    letter-spacing: 0.04em;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .foot-note .live-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .foot-note.saved .live-dot { background: var(--g-dot); box-shadow: 0 0 0 3px rgba(111,140,47,0.18); }
  .foot-actions { display: flex; gap: 10px; }
  .btn {
    appearance: none;
    height: 42px;
    padding: 0 20px;
    border-radius: 2px;
    font-family: "Geist", sans-serif;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.02em;
    cursor: default;
    transition: background .15s ease, transform .12s ease, box-shadow .15s ease, color .15s ease, border-color .15s ease;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    border: 1px solid var(--hair);
    background: var(--paper);
    color: var(--ink-2);
  }
  .btn:hover { background: var(--paper-2); border-color: var(--ink-3); color: var(--ink); transform: translateY(-1px); }
  .btn .arrow { transition: transform .15s ease; }
  .btn:hover .arrow { transform: translateX(3px); }
  .btn-primary {
    background: var(--ink);
    color: var(--paper);
    border-color: var(--ink);
  }
  .btn-primary:hover { background: var(--ink-2); color: var(--paper); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--ink);
    color: var(--paper);
    padding: 14px 18px;
    border-radius: 2px;
    font-family: "Geist", sans-serif;
    font-size: 12.5px;
    font-weight: 500;
    z-index: 100;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity .25s ease, transform .25s ease;
    pointer-events: none;
    display: inline-flex;
    align-items: center;
    gap: 12px;
    box-shadow: 0 20px 40px -20px rgba(28,25,22,0.5);
    border-left: 2px solid var(--accent);
  }
  .toast.show { opacity: 1; transform: translateY(0); }
  .toast .check {
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--accent);
    color: var(--paper);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
  }

  /* ─────────── RESPONSIVE ─────────── */
  @media (max-width: 1080px) {
    .page { padding: 28px 28px 40px; }
    .masthead { grid-template-columns: 1fr; }
    .mh-right { justify-content: flex-start; }
    .summary-rail { grid-template-columns: 1fr; }
    .status-tiles { grid-template-columns: repeat(2, 1fr); }
    .pod-meta { display: none; }
    table { table-layout: auto; }
    th.col-metric, th.col-notes { width: auto; }
    .metric-source { white-space: normal; }
  }
  @media (max-width: 640px) {
    .page { padding: 20px 18px 32px; }
    .mh-left h1 { font-size: 30px; }
    .pod-header { padding: 14px 16px; }
    tbody td, thead th { padding: 10px 16px; }
    .status-seg button { padding: 8px 0; }
  }
</style>
</head>

<div class="page" data-screen-label="01 Scorecard">

  <!-- ─── MASTHEAD ─── -->
  <header class="masthead">
    <div class="mh-left">
      <span class="eyebrow">MARKETING/IR REVIEW </span>

  </header>

  <!-- ─── SUMMARY RAIL ─── -->

        <div class="row1">
          <span class="dot"></span>
          <span class="pct" id="pctG">0%</span>
        </div>
        <div class="num" id="cntG">0</div>
        <div class="lbl">On track</div>
      </div>
      <div class="stile s-y" data-filter="y">

          <span class="dot"></span>
          <span class="pct" id="pctY">0%</span>
        </div>
        <div class="num" id="cntY">0</div>
        <div class="lbl">At risk</div>
      </div>
      <div class="stile s-r" data-filter="r">
        <div class="row1">
          <span class="dot"></span>
          <span class="pct" id="pctR">0%</span>
        </div>
        <div class="num" id="cntR">0</div>
        <div class="lbl">Off track</div>
      </div>
      <div class="stile s-n active" data-filter="n">

      </div>
    </div>
  </div>

  <!-- ─── PODS ─── -->
  <div id="scorecardBody" style="font-family: system-ui"></div>

  <!-- ─── FOOTER ─── -->
  <div class="foot">
    <div class="foot-note" id="savedNote">
      <span class="live-dot"></span>
      <span id="savedText">Not saved yet · changes held locally</span>
    </div>
    <div class="foot-actions">
      <button class="btn" id="btnReset" type="button">Reset week</button>
      <button class="btn" id="btnExport" type="button">Export CSV <span class="arrow">↓</span></button>
      <button class="btn btn-primary" id="btnSave" type="button">Save scorecard <span class="arrow">→</span></button>
    </div>
  </div>
</div>

<div class="toast" id="toast">
  <span class="check">✓</span>
  <span id="toastText">Saved</span>
</div>

<!-- ─────────── TWEAKS PANEL ─────────── -->
<aside class="tweaks-panel" id="tweaksPanel" aria-hidden="true">
  <header class="tweaks-header">
    <span class="title">Tweaks<em>.</em></span>
    <button class="close" id="tweaksClose" type="button" aria-label="Close tweaks">×</button>
  </header>
  <div class="tweaks-body">
    <div class="tweak-group">
      <div class="group-label"><span>Mood</span><span class="v" id="moodVal">Ivory</span></div>
      <div class="seg theme" data-tweak="theme">

    </div>
    <div class="tweak-group">
      <div class="group-label"><span>Density</span><span class="v" id="densityVal">Ledger</span></div>
      <div class="seg density" data-tweak="density">
        <button type="button" data-val="boardroom"><span class="sw"></span>Boardroom</button>
        <button type="button" data-val="ledger"><span class="sw"></span>Ledger</button>
        <button type="button" data-val="compact"><span class="sw"></span>Compact</button>
      </div>
    </div>
    <div class="tweak-group">
      <div class="group-label"><span>Status presentation</span><span class="v" id="statusVal">Bar</span></div>
      <div class="seg status-style" data-tweak="statusStyle">
        <button type="button" data-val="bar"><span class="sw"></span>Bar</button>
        <button type="button" data-val="filled"><span class="sw"></span>Filled</button>
        <button type="button" data-val="minimal"><span class="sw"></span>Minimal</button>
      </div>
    </div>
  </div>
  <div class="tweaks-foot">
    <span>3 controls · 27 combinations</span>
    <button type="button" id="tweaksReset">Reset defaults</button>
  </div>
</aside>

          { metric: 'Email Open Rate — Nurture (%)', dir: '↑', target: '> 35%', source: 'Sequences › Avg Open Rate, Active Sequences' },
          { metric: 'S&A Boxes Sent This Week', dir: '↑', target: '5', source: 'Contacts › S&A Status Changed to Sent This Week' },
          { metric: 'Hygiene Scorecard (0–100)', dir: '↑', target: '85', source: 'Friday Hygiene Calc: Owner + Source + Qualified + Dupes' },
          { metric: 'Event RSVPs Confirmed This Week', dir: '↑', target: '8', source: 'Contacts › Event RSVP Status = Confirmed This Week' }
        ]
      }
    ]
  }
];

// Italicize a single word inside a title
function styleTitle(t, em) {
  if (!em || !t.includes(em)) return t;
  return t.replace(em, '<em>' + em + '</em>');
}

const STATUS_KEYS = {
  '🟢': 'g', '🟡': 'y', '🔴': 'r', '—': 'n',
  'g': 'g', 'y': 'y', 'r': 'r', 'n': 'n', '': 'n', undefined: 'n', null: 'n'
};

const state = {};

function rowKey(secId, metric) { return secId + '::' + metric; }

function buildPods() {
  const body = document.getElementById('scorecardBody');
  body.innerHTML = '';

  SECTIONS.forEach(sec => {
    const pod = document.createElement('section');
    pod.className = 'pod';
    pod.dataset.pod = sec.id;
    pod.setAttribute('data-screen-label', sec.badge + ' / ' + sec.title);

    pod.innerHTML =
      '<header class="pod-header">' +
        '<div class="pod-id">' +
          '<span class="pod-badge ' + sec.badgeClass + '">' + sec.badge + '</span>' +
          '<h2 class="pod-title">' + styleTitle(sec.title, sec.italic) + '</h2>' +
        '</div>' +
        '<div class="pod-meta">' +
          '<span><span class="k">Owner</span><span class="v">' + sec.owner + '</span></span>' +
          '<span><span class="k">Code</span><span class="v">' + sec.code + '</span></span>' +
          '<span class="pod-pill-row" data-pillrow="' + sec.id + '">' +
            '<span class="pod-pill"><span class="pd g"></span><span data-pcount="g">0</span></span>' +
            '<span class="pod-pill"><span class="pd y"></span><span data-pcount="y">0</span></span>' +
            '<span class="pod-pill"><span class="pd r"></span><span data-pcount="r">0</span></span>' +
            '<span class="pod-pill"><span class="pd n"></span><span data-pcount="n">0</span></span>' +
          '</span>' +
        '</div>' +
      '</header>';

    const tbl = document.createElement('table');
    tbl.innerHTML =
      '<thead><tr>' +
        '<th class="col-metric"><span class="num-mark">№</span>Metric</th>' +
        '<th class="col-target">Target</th>' +
        '<th class="col-actual">Actual</th>' +
        '<th class="col-status">Status</th>' +
        '<th class="col-notes">Notes</th>' +
      '</tr></thead>';

    const tbody = document.createElement('tbody');
    let metricIdx = 0;
    let isFirstSub = true;

    sec.subsections.forEach((sub) => {
      if (sub.label) {
        const subTr = document.createElement('tr');
        subTr.className = 'sub-row' + (isFirstSub ? ' first' : '');
        subTr.innerHTML = '<td colspan="5"><span class="lbl">' + sub.label + '</span></td>';
        tbody.appendChild(subTr);
        isFirstSub = false;
      }

      sub.rows.forEach((row) => {
        metricIdx++;
        const k = rowKey(sec.id, row.metric);
        if (!state[k]) state[k] = { actual: '', status: 'n', notes: '' };
        const s = state[k];

        const tr = document.createElement('tr');
        tr.dataset.key = k;
        if (s.status && s.status !== 'n') tr.classList.add('row-' + s.status);

        const numLabel = String(metricIdx).padStart(2, '0');
        tr.innerHTML =
          '<td>' +
            '<div class="metric-name"><span class="mono" style="color: var(--mute); font-size: 11px; margin-right: 8px;">' + numLabel + '</span>' + row.metric + '</div>' +
            '<div class="metric-source">' + row.source + '</div>' +
          '</td>' +
          '<td class="target-val">' + row.target + '</td>' +
          '<td><input class="actual-input" type="text" placeholder="—" value="' + (s.actual || '') + '" data-key="' + k + '" data-field="actual" data-target="' + row.target + '" /></td>' +
          '<td>' +
            '<div class="status-seg" data-statusgroup="' + k + '">' +
              '<button type="button" data-val="g" class="' + (s.status === 'g' ? 'is-active' : '') + '" title="On track"><span class="sd"></span></button>' +
              '<button type="button" data-val="y" class="' + (s.status === 'y' ? 'is-active' : '') + '" title="At risk"><span class="sd"></span></button>' +
              '<button type="button" data-val="r" class="' + (s.status === 'r' ? 'is-active' : '') + '" title="Off track"><span class="sd"></span></button>' +
              '<button type="button" data-val="n" class="' + (s.status === 'n' ? 'is-active' : '') + '" title="Not updated"><span class="sd"></span></button>' +
            '</div>' +
          '</td>' +
          '<td><textarea class="notes-input" placeholder="Add a note…" data-key="' + k + '" data-field="notes" rows="1">' + (s.notes || '') + '</textarea></td>';
        tbody.appendChild(tr);
      });
    });

    tbl.appendChild(tbody);
    pod.appendChild(tbl);
    body.appendChild(pod);
  });

  wireInputs();
  updateSummary();
}

function wireInputs() {
  document.querySelectorAll('.actual-input, .notes-input').forEach(el => {
    el.addEventListener('input', (e) => {
      const k = e.target.dataset.key;
      const f = e.target.dataset.field;
      state[k][f] = e.target.value;
      markDirty();
    });
  });

  document.querySelectorAll('.status-seg').forEach(seg => {
    seg.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-val]');
      if (!btn) return;
      const k = seg.dataset.statusgroup;
      const val = btn.dataset.val;
      state[k].status = val;
      seg.querySelectorAll('button').forEach(b => b.classList.toggle('is-active', b === btn));

      const row = btn.closest('tr');
      row.classList.remove('row-g', 'row-y', 'row-r');
      if (val !== 'n') row.classList.add('row-' + val);

      updateSummary();
      markDirty();
    });
  });
}

function updateSummary() {
  // Global counts + per-pod
  const podCounts = {};
  SECTIONS.forEach(s => { podCounts[s.id] = { g: 0, y: 0, r: 0, n: 0 }; });

  let g = 0, y = 0, r = 0, n = 0;
  SECTIONS.forEach(sec => {
    sec.subsections.forEach(sub => {
      sub.rows.forEach(row => {
        const k = rowKey(sec.id, row.metric);
        const st = (state[k] && state[k].status) || 'n';
        podCounts[sec.id][st]++;
        if (st === 'g') g++; else if (st === 'y') y++; else if (st === 'r') r++; else n++;
      });
    });
  });

  const total = g + y + r + n || 1;
  const setCount = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
  setCount('cntG', g); setCount('cntY', y); setCount('cntR', r); setCount('cntN', n);
  const pct = (v) => Math.round((v / total) * 100) + '%';
  setCount('pctG', pct(g)); setCount('pctY', pct(y)); setCount('pctR', pct(r)); setCount('pctN', pct(n));

  // Pod pill rows
  document.querySelectorAll('[data-pillrow]').forEach(row => {
    const id = row.dataset.pillrow;
    const c = podCounts[id];
    row.querySelector('[data-pcount="g"]').textContent = c.g;
    row.querySelector('[data-pcount="y"]').textContent = c.y;
    row.querySelector('[data-pcount="r"]').textContent = c.r;
    row.querySelector('[data-pcount="n"]').textContent = c.n;
  });
}

// Progress card removed — keep stub so listeners stay harmless.
function updateProgress() { /* no-op */ }

let saveTimer = null;
function markDirty() {
  const note = document.getElementById('savedNote');
  const txt = document.getElementById('savedText');
  note.classList.remove('saved');
  txt.textContent = 'Unsaved changes · auto-saving…';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => saveData(true), 1200);
}

function saveData(silent) {
  const weekDate = document.getElementById('weekDate').value;
  const weekNum  = document.getElementById('weekNum').value;
  const key = 'apta_scorecard_w' + weekNum + '_' + weekDate;
  try {
    localStorage.setItem(key, JSON.stringify(state));
    localStorage.setItem('apta_last_save', key);
  } catch (err) { /* storage may be unavailable */ }

  const note = document.getElementById('savedNote');
  const txt = document.getElementById('savedText');
  const now = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  note.classList.add('saved');
  txt.textContent = 'Saved at ' + now + ' · Week ' + weekNum;
  if (!silent) showToast('Scorecard saved');
}

function loadData() {
  try {
    const lastKey = localStorage.getItem('apta_last_save');
    if (!lastKey) return;
    const saved = localStorage.getItem(lastKey);
    if (!saved) return;
    const parsed = JSON.parse(saved);

    // Normalize legacy status emojis
    Object.keys(parsed).forEach(k => {
      if (parsed[k] && parsed[k].status) {
        parsed[k].status = STATUS_KEYS[parsed[k].status] || 'n';
      }
    });
    Object.assign(state, parsed);

    const parts = lastKey.split('_');
    const wn = parts[2] && parts[2].replace('w', '');
    const wd = parts[3];
    if (wn) document.getElementById('weekNum').value = wn;
    if (wd) document.getElementById('weekDate').value = wd;

    const txt = document.getElementById('savedText');
    document.getElementById('savedNote').classList.add('saved');
    txt.textContent = 'Loaded · Week ' + wn;
  } catch (err) { /* ignore */ }
}

function exportCSV() {
  const sLabel = { g: 'On track', y: 'At risk', r: 'Off track', n: 'Not updated' };
  let csv = 'Pod,Metric,Direction,Target,Actual,Status,Notes\n';
  SECTIONS.forEach(sec => {
    sec.subsections.forEach(sub => {
      sub.rows.forEach(row => {
        const k = rowKey(sec.id, row.metric);
        const s = state[k] || {};
        const esc = v => '"' + String(v || '').replace(/"/g, '""') + '"';
        csv += [sec.badge, esc(row.metric), row.dir, esc(row.target), esc(s.actual || ''), esc(sLabel[s.status || 'n']), esc(s.notes || '')].join(',') + '\n';
      });
    });
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'apta-scorecard-w' + document.getElementById('weekNum').value + '.csv';
  document.body.appendChild(a);
  a.click();
  a.remove();
  showToast('CSV exported');
}

function resetWeek() {
  if (!confirm('Reset all entries for this week? This cannot be undone.')) return;
  Object.keys(state).forEach(k => { state[k] = { actual: '', status: 'n', notes: '' }; });
  buildPods();
  saveData(true);
  showToast('Week reset');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  document.getElementById('toastText').textContent = msg;
  t.classList.add('show');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── INIT ──
const today = new Date();
const monday = new Date(today);
monday.setDate(today.getDate() - ((today.getDay() + 6) % 7));
document.getElementById('weekDate').value = monday.toISOString().split('T')[0];

loadData();
buildPods();
updateProgress();

document.getElementById('weekNum').addEventListener('input', updateProgress);
document.getElementById('weekNum').addEventListener('change', () => { updateProgress(); markDirty(); });
document.getElementById('weekDate').addEventListener('change', markDirty);

document.getElementById('btnSave').addEventListener('click', () => saveData(false));
document.getElementById('btnExport').addEventListener('click', exportCSV);
document.getElementById('btnReset').addEventListener('click', resetWeek);

/* ─────────── TWEAKS PANEL ─────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "ivory",
  "density": "ledger",
  "statusStyle": "bar"
}/*EDITMODE-END*/;

const tweaksState = Object.assign({}, TWEAK_DEFAULTS);

const TWEAK_LABELS = {
  theme:       { ivory: 'Ivory', ink: 'Ink', sepia: 'Sepia' },
  density:     { boardroom: 'Boardroom', ledger: 'Ledger', compact: 'Compact' },
  statusStyle: { bar: 'Bar', filled: 'Filled', minimal: 'Minimal' }
};

function applyTweaks() {
  document.body.setAttribute('data-theme', tweaksState.theme);
  document.body.setAttribute('data-density', tweaksState.density);
  document.body.setAttribute('data-status-style', tweaksState.statusStyle);

  document.getElementById('moodVal').textContent     = TWEAK_LABELS.theme[tweaksState.theme] || '';
  document.getElementById('densityVal').textContent  = TWEAK_LABELS.density[tweaksState.density] || '';
  document.getElementById('statusVal').textContent   = TWEAK_LABELS.statusStyle[tweaksState.statusStyle] || '';

  document.querySelectorAll('.tweaks-panel .seg').forEach(seg => {
    const k = seg.dataset.tweak;
    seg.querySelectorAll('button').forEach(b => {
      b.classList.toggle('is-active', b.dataset.val === tweaksState[k]);
    });
  });
}

function setTweak(key, val) {
  tweaksState[key] = val;
  applyTweaks();
  try {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [key]: val } }, '*');
  } catch (err) { /* parent unavailable */ }
}

document.querySelectorAll('.tweaks-panel .seg').forEach(seg => {
  seg.addEventListener('click', (e) => {
    const btn = e.target.closest('button[data-val]');
    if (!btn) return;
    setTweak(seg.dataset.tweak, btn.dataset.val);
  });
});

const tweaksPanel = document.getElementById('tweaksPanel');
function openTweaks() { tweaksPanel.classList.add('is-open'); tweaksPanel.setAttribute('aria-hidden', 'false'); }
function closeTweaks() {
  tweaksPanel.classList.remove('is-open');
  tweaksPanel.setAttribute('aria-hidden', 'true');
  try { window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); } catch (err) {}
}

document.getElementById('tweaksClose').addEventListener('click', closeTweaks);
document.getElementById('tweaksReset').addEventListener('click', () => {
  Object.keys(TWEAK_DEFAULTS).forEach(k => setTweak(k, TWEAK_DEFAULTS[k]));
});

window.addEventListener('message', (e) => {
  const data = e && e.data;
  if (!data || !data.type) return;
  if (data.type === '__activate_edit_mode')   openTweaks();
  if (data.type === '__deactivate_edit_mode') closeTweaks();
});

applyTweaks();
try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (err) {}
</script>
